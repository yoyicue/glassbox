name: CI

# CUQ-3.3: the reliability merge gate. Runs the device-independent smoke suite
# + ruff on every PR / push to main so a reliability regression cannot merge
# silently (docs/design/computer_use_success_rate.md: "no reliability change
# merges without it"). Uses a macOS runner because `ocrmac` (a core dependency)
# wraps Apple Vision and only installs on darwin.

on:
  pull_request:
  push:
    branches: [main]

# Least privilege: the gate only checks out and tests — it never writes back
# to the repo, so the GITHUB_TOKEN gets read-only contents.
permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v5
        with:
          python-version: "3.11"
      - name: Sync dependencies
        run: uv sync --extra dev
      - name: Merge gate (make check)
        # Literally the gate contributors run locally — lint, smoke suite,
        # offline reliability regression gate, golden-corpus audit (no-ops
        # here: artifacts/ is not in CI), and the wheel packaging smoke.
        # Running the make target instead of hand-copied steps keeps CI from
        # drifting out of sync with the local gate.
        run: make check
